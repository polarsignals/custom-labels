[package]
name = "otel-thread-ctx"
version = "0.5.0"
edition = "2021"
license = "Apache-2.0"
keywords = ["profiling", "pprof"]
description = "Provides a mechanism for OpenTelemetry SDKs to publish thread-level attributes for out-of-process readers such as the OpenTelemetry eBPF profilers"
repository = "https://github.com/open-telemetry/sig-profiling"
readme = "README.md"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[build-dependencies]
bindgen = { version = "0.72", default-features = false, features = ["runtime"] }
cc = "1.0"

[dev-dependencies]
rand = "0.8.5"

[dependencies]
libc = "0.2"
pin-project-lite = "0.2"
